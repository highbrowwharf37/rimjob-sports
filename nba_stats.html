<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Stats Tracker — Fantasy Points & Player Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f9f7f4; --surface: #fff; --border: #e2ddd7;
  --text-primary: #1a1916; --text-secondary: #6b6560; --text-muted: #9e9892;
  --accent: #c0392b; --accent-light: #fdf3f2;
  --green: #27ae60; --green-light: #f0faf4;
  --blue: #2471a3; --blue-light: #eaf3fb;
  --amber: #d68910; --amber-light: #fef9ec;
  --purple: #7d3c98; --purple-light: #f5eef8;
  --font-sans: 'Libre Franklin', sans-serif;
  --font-serif: 'Source Serif 4', serif;
}
body { background: var(--bg); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; }
header { background: var(--text-primary); color: white; padding: 0 24px; border-bottom: 3px solid var(--accent); }
.header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: white; }
.logo span { color: var(--accent); font-style: italic; }
.header-meta { font-size: 11px; color: #aaa; text-align: right; line-height: 1.6; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; overflow-x: auto; }
.nav-inner { max-width: 1280px; margin: 0 auto; display: flex; padding: 0 24px; }
.nav-tab { padding: 13px 15px; font-size: 12px; font-weight: 700; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
main { max-width: 1280px; margin: 0 auto; padding: 24px; }
.section { display: none; }
.section.active { display: block; }
.page-title { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 14px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.page-title h1 { font-family: var(--font-serif); font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
.page-title p { font-size: 12px; color: var(--text-muted); font-style: italic; }
.filters { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.filters label { font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
.filters select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 3px; font-family: var(--font-sans); font-size: 13px; background: white; color: var(--text-primary); outline: none; }
.filters select:focus { border-color: var(--accent); }
.filter-spacer { flex: 1; }
.last-updated { font-size: 11px; color: var(--text-muted); font-style: italic; }
.table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; background: white; }
table { width: 100%; border-collapse: collapse; min-width: 650px; }
thead th { background: #f4f1ed; padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); border-bottom: 1px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; }
thead th:hover { color: var(--text-primary); }
thead th.sorted { color: var(--accent); }
thead th.num, td.num { text-align: right; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf8f5; }
td { padding: 10px 12px; font-size: 13px; white-space: nowrap; }
.rank-cell { font-size: 11px; font-weight: 700; color: var(--text-muted); min-width: 32px; }
.rank-cell.top5 { color: var(--accent); }
.player-cell { font-weight: 600; }
.season-tag { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: 5px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; }
.stat-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px; }
.stat-card-value { font-family: var(--font-serif); font-size: 24px; font-weight: 600; letter-spacing: -1px; }
.stat-card-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.pill { display: inline-block; padding: 2px 6px; border-radius: 2px; font-size: 11px; font-weight: 600; }
.pill-green { background: var(--green-light); color: var(--green); }
.pill-blue { background: var(--blue-light); color: var(--blue); }
.pill-amber { background: var(--amber-light); color: var(--amber); }
.bar-wrap { display: flex; align-items: center; gap: 7px; justify-content: flex-end; }
.bar-bg { width: 60px; height: 5px; background: var(--border); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-green .bar-fill { background: var(--green); }
.bar-blue .bar-fill { background: var(--blue); }
.loading-bar { background: white; border: 1px solid var(--border); border-radius: 4px; padding: 40px; text-align: center; color: var(--text-muted); }
.spinner { width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: var(--accent-light); border: 1px solid #f5c6c4; border-radius: 4px; padding: 18px 22px; color: var(--accent); font-size: 13px; line-height: 1.8; }
.data-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-style: italic; }
.highlight-row { background: var(--blue-light) !important; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">NBA<span>Tracker</span></div>
    <div class="header-meta">Fantasy Points & Player Stats<br><span id="last-updated-header">Updated Daily</span></div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <div class="nav-tab active" onclick="switchTab('alltime')">All Time Leaders</div>
    <div class="nav-tab" onclick="switchTab('byseason')">By Season</div>
  </div>
</nav>

<main>

<!-- ALL TIME LEADERS -->
<div class="section active" id="alltime">
  <div class="page-title"><div><h1>All-Time Fantasy Points Leaders</h1><p>Complete historical data across all seasons</p></div></div>
  <div class="filters">
    <label>Sort By</label>
    <select id="alltime-sort" onchange="renderAllTime()">
      <option value="fpg">Fantasy Points Per Game</option>
      <option value="tfp">Total Fantasy Points</option>
      <option value="pts">Total Points</option>
      <option value="reb">Rebounds</option>
      <option value="ast">Assists</option>
    </select>
    <label>Min Games</label>
    <select id="alltime-mingp" onchange="renderAllTime()">
      <option value="0">All</option>
      <option value="10">10+</option>
      <option value="25">25+</option>
      <option value="50">50+</option>
    </select>
    <div class="filter-spacer"></div>
    <span class="last-updated" id="alltime-updated"></span>
  </div>
  <div id="alltime-container"><div class="loading-bar"><div class="spinner"></div>Loading...</div></div>
  <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 24px; gap: 12px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;">Rows per page</label>
      <select id="alltime-rows-select" onchange="renderAllTime()" style="padding: 6px 10px; border: 1px solid var(--border); border-radius: 3px; font-family: var(--font-sans); font-size: 13px; background: white; color: var(--text-primary); outline: none;">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
      <button onclick="prevAllTimePage()" style="padding: 6px 10px; border: 1px solid var(--border); background: white; border-radius: 3px; cursor: pointer; font-size: 13px;">←</button>
      <span style="font-size: 13px; white-space: nowrap;"><span id="alltime-total-count">0</span> Rows · Page <input type="number" id="alltime-page-input" min="1" onchange="goToAllTimePageInput()" style="width: 50px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 3px; text-align: center; font-size: 13px;" value="1"> of <span id="alltime-total-pages">1</span></span>
      <button onclick="nextAllTimePage()" style="padding: 6px 10px; border: 1px solid var(--border); background: white; border-radius: 3px; cursor: pointer; font-size: 13px;">→</button>
    </div>
  </div>
</div>

<!-- BY SEASON -->
<div class="section" id="byseason">
  <div class="page-title"><div><h1>Season Leaders</h1><p>Complete player statistics for selected season</p></div></div>
  <div class="filters">
    <label>Season</label>
    <select id="season-selector" onchange="renderBySeason()">
      <option value="">Select Season...</option>
    </select>
    <label>Sort By</label>
    <select id="season-sort" onchange="renderBySeason()">
      <option value="fpg">Fantasy Points Per Game</option>
      <option value="tfp">Total Fantasy Points</option>
      <option value="pts">Total Points</option>
    </select>
    <div class="filter-spacer"></div>
    <span class="last-updated" id="season-updated"></span>
  </div>
  <div id="byseason-container"><div class="loading-bar"><div class="spinner"></div>Loading season data...</div></div>
  <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 24px; gap: 12px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 11px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;">Rows per page</label>
      <select id="season-rows-select" onchange="renderBySeason()" style="padding: 6px 10px; border: 1px solid var(--border); border-radius: 3px; font-family: var(--font-sans); font-size: 13px; background: white; color: var(--text-primary); outline: none;">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
      <button onclick="prevSeasonPage()" style="padding: 6px 10px; border: 1px solid var(--border); background: white; border-radius: 3px; cursor: pointer; font-size: 13px;">←</button>
      <span style="font-size: 13px; white-space: nowrap;"><span id="season-total-count">0</span> Rows · Page <input type="number" id="season-page-input" min="1" onchange="goToSeasonPageInput()" style="width: 50px; padding: 4px 6px; border: 1px solid var(--border); border-radius: 3px; text-align: center; font-size: 13px;" value="1"> of <span id="season-total-pages">1</span></span>
      <button onclick="nextSeasonPage()" style="padding: 6px 10px; border: 1px solid var(--border); background: white; border-radius: 3px; cursor: pointer; font-size: 13px;">→</button>
    </div>
  </div>
</div>

</main>

<script>
// ===== DATA LOADING =====
let allTimeData = [];
let seasonalData = {};
let availableSeasons = [];

// ===== PAGINATION STATE =====
let allTimeCurrentPage = 1;
let seasonCurrentPage = 1;

function parseJSONPlayer(row, season = null) {
  return {
    player: String(row.Player || ''),
    season: season || String(row.Season || ''),
    gp: parseInt(row.GP) || 0,
    pts: parseInt(row.PTS) || 0,
    reb: parseInt(row.REB) || 0,
    ast: parseInt(row.AST) || 0,
    stl: parseInt(row.STL) || 0,
    blk: parseInt(row.BLK) || 0,
    fg3m: parseInt(row.FG3M) || 0,
    tov: parseInt(row.TOV) || 0,
    fg40: parseInt(row['40-Point Games']) || 0,
    fg50: parseInt(row['50-Point Games']) || 0,
    dd: parseInt(row['Double Doubles']) || 0,
    td: parseInt(row['Triple Doubles']) || 0,
    tfp: parseFloat(row['Total Fantasy Points']) || 0,
    fpg: parseFloat(row['Fantasy Points Per Game']) || 0,
  };
}

async function loadData() {
  try {
    // Load full stats
    const fullRes = await fetch('./nba_data/nba_stats_full.json');
    if (!fullRes.ok) throw new Error('Could not load full stats');
    const fullData = await fullRes.json();
    allTimeData = fullData.map(row => parseJSONPlayer(row)).filter(p => p.player && p.gp > 0);

    // Load manifest to get available seasons
    const manifestRes = await fetch('./nba_data/manifest.json');
    if (manifestRes.ok) {
      const manifest = await manifestRes.json();
      availableSeasons = manifest.years || [];
    }

    // Load seasonal data
    for (const season of availableSeasons) {
      try {
        const res = await fetch(`./nba_data/nba_stats_${season}.json`);
        if (res.ok) {
          const data = await res.json();
          seasonalData[season] = data.map(row => parseJSONPlayer(row, season)).filter(p => p.player && p.gp > 0);
        }
      } catch(e) {
        // Season file not found, skip
      }
    }

    // Populate season selector
    const selector = document.getElementById('season-selector');
    selector.innerHTML = '';
    availableSeasons.forEach(s => {
      selector.innerHTML += `<option value="${s}">${s}</option>`;
    });

    // Auto-select 2025-26 season if available
    if (availableSeasons.includes('2025-26')) {
      selector.value = '2025-26';
      renderBySeason();
    }

    renderAll();
  } catch(err) {
    const html = `<div class="error-box">⚠️ <strong>Could not load data.</strong> ${err.message}<br>Make sure to run <code>python build_nba_json.py</code> first to generate JSON files.</div>`;
    document.getElementById('alltime-container').innerHTML = html;
    document.getElementById('byseason-container').innerHTML = html;
  }
}

// ===== RENDERING =====
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target?.classList.add('active');
}

function formatNumber(n, decimals = 0) {
  return typeof n === 'number' ? n.toFixed(decimals) : '—';
}

function renderAllTime() {
  const sortBy = document.getElementById('alltime-sort')?.value || 'fpg';
  const minGp = parseInt(document.getElementById('alltime-mingp')?.value || 0);
  const rowsPerPage = parseInt(document.getElementById('alltime-rows-select')?.value || 50);
  
  let data = [...allTimeData].filter(p => p.gp >= minGp);
  
  if (sortBy === 'fpg') data.sort((a, b) => b.fpg - a.fpg);
  else if (sortBy === 'tfp') data.sort((a, b) => b.tfp - a.tfp);
  else if (sortBy === 'pts') data.sort((a, b) => b.pts - a.pts);
  else if (sortBy === 'reb') data.sort((a, b) => b.reb - a.reb);
  else if (sortBy === 'ast') data.sort((a, b) => b.ast - a.ast);

  allTimeCurrentPage = 1;
  const totalCount = data.length;
  const totalPages = Math.ceil(totalCount / rowsPerPage);
  const startIdx = (allTimeCurrentPage - 1) * rowsPerPage;
  const endIdx = startIdx + rowsPerPage;
  const displayData = data.slice(startIdx, endIdx);

  const html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num" style="width:40px">#</th>
            <th style="min-width:160px">Player</th>
            <th class="num">Season</th>
            <th class="num">GP</th>
            <th class="num">PTS</th>
            <th class="num">REB</th>
            <th class="num">AST</th>
            <th class="num">FG3M</th>
            <th class="num">STL</th>
            <th class="num">BLK</th>
            <th class="num">TOV</th>
            <th class="num">FP</th>
            <th class="num">FP/G</th>
          </tr>
        </thead>
        <tbody>
          ${displayData.map((p, idx) => `
            <tr class="${idx < 10 ? 'highlight-row' : ''}">
              <td class="num rank-cell ${idx < 5 ? 'top5' : ''}">${startIdx + idx + 1}</td>
              <td class="player-cell">${p.player} <span class="season-tag">${p.season}</span></td>
              <td class="num">${p.season}</td>
              <td class="num">${p.gp}</td>
              <td class="num">${p.pts}</td>
              <td class="num">${p.reb}</td>
              <td class="num">${p.ast}</td>
              <td class="num">${p.fg3m}</td>
              <td class="num">${p.stl}</td>
              <td class="num">${p.blk}</td>
              <td class="num">${p.tov}</td>
              <td class="num" style="font-weight:700">${formatNumber(p.tfp, 1)}</td>
              <td class="num" style="font-weight:700;color:var(--accent)">${formatNumber(p.fpg, 2)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('alltime-container').innerHTML = html;
  document.getElementById('alltime-total-count').textContent = totalCount;
  document.getElementById('alltime-total-pages').textContent = totalPages;
  document.getElementById('alltime-page-input').value = allTimeCurrentPage;
  document.getElementById('alltime-page-input').max = totalPages;
}

function renderBySeason() {
  const season = document.getElementById('season-selector')?.value;
  if (!season) {
    document.getElementById('byseason-container').innerHTML = '<div class="loading-bar">Select a season to view data</div>';
    return;
  }
  
  const sortBy = document.getElementById('season-sort')?.value || 'fpg';
  const rowsPerPage = parseInt(document.getElementById('season-rows-select')?.value || 50);
  let data = [...(seasonalData[season] || [])];
  
  if (sortBy === 'fpg') data.sort((a, b) => b.fpg - a.fpg);
  else if (sortBy === 'tfp') data.sort((a, b) => b.tfp - a.tfp);
  else if (sortBy === 'pts') data.sort((a, b) => b.pts - a.pts);

  seasonCurrentPage = 1;
  const totalCount = data.length;
  const totalPages = Math.ceil(totalCount / rowsPerPage);
  const startIdx = (seasonCurrentPage - 1) * rowsPerPage;
  const endIdx = startIdx + rowsPerPage;
  const displayData = data.slice(startIdx, endIdx);

  const html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num" style="width:40px">#</th>
            <th style="min-width:160px">Player</th>
            <th class="num">GP</th>
            <th class="num">PTS</th>
            <th class="num">REB</th>
            <th class="num">AST</th>
            <th class="num">FG3M</th>
            <th class="num">STL</th>
            <th class="num">BLK</th>
            <th class="num">TOV</th>
            <th class="num">FP</th>
            <th class="num">FP/G</th>
          </tr>
        </thead>
        <tbody>
          ${displayData.map((p, idx) => `
            <tr class="${idx < 5 ? 'highlight-row' : ''}">
              <td class="num rank-cell ${idx < 3 ? 'top5' : ''}">${startIdx + idx + 1}</td>
              <td class="player-cell">${p.player}</td>
              <td class="num">${p.gp}</td>
              <td class="num">${p.pts}</td>
              <td class="num">${p.reb}</td>
              <td class="num">${p.ast}</td>
              <td class="num">${p.fg3m}</td>
              <td class="num">${p.stl}</td>
              <td class="num">${p.blk}</td>
              <td class="num">${p.tov}</td>
              <td class="num" style="font-weight:700">${formatNumber(p.tfp, 1)}</td>
              <td class="num" style="font-weight:700;color:var(--accent)">${formatNumber(p.fpg, 2)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('byseason-container').innerHTML = html;
  document.getElementById('season-total-count').textContent = totalCount;
  document.getElementById('season-total-pages').textContent = totalPages;
  document.getElementById('season-page-input').value = seasonCurrentPage;
  document.getElementById('season-page-input').max = totalPages;
}

function renderAll() {
  renderAllTime();
}

function prevAllTimePage() {
  if (allTimeCurrentPage > 1) {
    allTimeCurrentPage--;
    updateAllTimeDisplay();
  }
}

function nextAllTimePage() {
  const rowsPerPage = parseInt(document.getElementById('alltime-rows-select')?.value || 50);
  const minGp = parseInt(document.getElementById('alltime-mingp')?.value || 0);
  const sortBy = document.getElementById('alltime-sort')?.value || 'fpg';
  
  let data = [...allTimeData].filter(p => p.gp >= minGp);
  if (sortBy === 'fpg') data.sort((a, b) => b.fpg - a.fpg);
  else if (sortBy === 'tfp') data.sort((a, b) => b.tfp - a.tfp);
  else if (sortBy === 'pts') data.sort((a, b) => b.pts - a.pts);
  else if (sortBy === 'reb') data.sort((a, b) => b.reb - a.reb);
  else if (sortBy === 'ast') data.sort((a, b) => b.ast - a.ast);
  
  const totalPages = Math.ceil(data.length / rowsPerPage);
  if (allTimeCurrentPage < totalPages) {
    allTimeCurrentPage++;
    updateAllTimeDisplay();
  }
}

function goToAllTimePageInput() {
  const input = document.getElementById('alltime-page-input');
  const rowsPerPage = parseInt(document.getElementById('alltime-rows-select')?.value || 50);
  const minGp = parseInt(document.getElementById('alltime-mingp')?.value || 0);
  const sortBy = document.getElementById('alltime-sort')?.value || 'fpg';
  
  let data = [...allTimeData].filter(p => p.gp >= minGp);
  if (sortBy === 'fpg') data.sort((a, b) => b.fpg - a.fpg);
  else if (sortBy === 'tfp') data.sort((a, b) => b.tfp - a.tfp);
  else if (sortBy === 'pts') data.sort((a, b) => b.pts - a.pts);
  else if (sortBy === 'reb') data.sort((a, b) => b.reb - a.reb);
  else if (sortBy === 'ast') data.sort((a, b) => b.ast - a.ast);
  
  const page = parseInt(input.value);
  const totalPages = Math.ceil(data.length / rowsPerPage);
  if (page >= 1 && page <= totalPages) {
    allTimeCurrentPage = page;
    updateAllTimeDisplay();
  } else {
    input.value = allTimeCurrentPage;
  }
}

function updateAllTimeDisplay() {
  const sortBy = document.getElementById('alltime-sort')?.value || 'fpg';
  const minGp = parseInt(document.getElementById('alltime-mingp')?.value || 0);
  const rowsPerPage = parseInt(document.getElementById('alltime-rows-select')?.value || 50);
  
  let data = [...allTimeData].filter(p => p.gp >= minGp);
  
  if (sortBy === 'fpg') data.sort((a, b) => b.fpg - a.fpg);
  else if (sortBy === 'tfp') data.sort((a, b) => b.tfp - a.tfp);
  else if (sortBy === 'pts') data.sort((a, b) => b.pts - a.pts);
  else if (sortBy === 'reb') data.sort((a, b) => b.reb - a.reb);
  else if (sortBy === 'ast') data.sort((a, b) => b.ast - a.ast);

  const startIdx = (allTimeCurrentPage - 1) * rowsPerPage;
  const endIdx = startIdx + rowsPerPage;
  const displayData = data.slice(startIdx, endIdx);

  const html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num" style="width:40px">#</th>
            <th style="min-width:160px">Player</th>
            <th class="num">Season</th>
            <th class="num">GP</th>
            <th class="num">PTS</th>
            <th class="num">REB</th>
            <th class="num">AST</th>
            <th class="num">FG3M</th>
            <th class="num">STL</th>
            <th class="num">BLK</th>
            <th class="num">TOV</th>
            <th class="num">FP</th>
            <th class="num">FP/G</th>
          </tr>
        </thead>
        <tbody>
          ${displayData.map((p, idx) => `
            <tr class="${idx < 10 ? 'highlight-row' : ''}">
              <td class="num rank-cell ${idx < 5 ? 'top5' : ''}">${startIdx + idx + 1}</td>
              <td class="player-cell">${p.player} <span class="season-tag">${p.season}</span></td>
              <td class="num">${p.season}</td>
              <td class="num">${p.gp}</td>
              <td class="num">${p.pts}</td>
              <td class="num">${p.reb}</td>
              <td class="num">${p.ast}</td>
              <td class="num">${p.fg3m}</td>
              <td class="num">${p.stl}</td>
              <td class="num">${p.blk}</td>
              <td class="num">${p.tov}</td>
              <td class="num" style="font-weight:700">${formatNumber(p.tfp, 1)}</td>
              <td class="num" style="font-weight:700;color:var(--accent)">${formatNumber(p.fpg, 2)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('alltime-container').innerHTML = html;
  document.getElementById('alltime-page-input').value = allTimeCurrentPage;
}

function prevSeasonPage() {
  if (seasonCurrentPage > 1) {
    seasonCurrentPage--;
    updateSeasonDisplay();
  }
}

function nextSeasonPage() {
  const season = document.getElementById('season-selector')?.value;
  if (!season) return;
  
  const rowsPerPage = parseInt(document.getElementById('season-rows-select')?.value || 50);
  let data = [...(seasonalData[season] || [])];
  
  const totalPages = Math.ceil(data.length / rowsPerPage);
  if (seasonCurrentPage < totalPages) {
    seasonCurrentPage++;
    updateSeasonDisplay();
  }
}

function goToSeasonPageInput() {
  const season = document.getElementById('season-selector')?.value;
  if (!season) return;
  
  const input = document.getElementById('season-page-input');
  const rowsPerPage = parseInt(document.getElementById('season-rows-select')?.value || 50);
  let data = [...(seasonalData[season] || [])];
  
  const page = parseInt(input.value);
  const totalPages = Math.ceil(data.length / rowsPerPage);
  if (page >= 1 && page <= totalPages) {
    seasonCurrentPage = page;
    updateSeasonDisplay();
  } else {
    input.value = seasonCurrentPage;
  }
}

function updateSeasonDisplay() {
  const season = document.getElementById('season-selector')?.value;
  if (!season) return;
  
  const sortBy = document.getElementById('season-sort')?.value || 'fpg';
  const rowsPerPage = parseInt(document.getElementById('season-rows-select')?.value || 50);
  let data = [...(seasonalData[season] || [])];
  
  if (sortBy === 'fpg') data.sort((a, b) => b.fpg - a.fpg);
  else if (sortBy === 'tfp') data.sort((a, b) => b.tfp - a.tfp);
  else if (sortBy === 'pts') data.sort((a, b) => b.pts - a.pts);

  const startIdx = (seasonCurrentPage - 1) * rowsPerPage;
  const endIdx = startIdx + rowsPerPage;
  const displayData = data.slice(startIdx, endIdx);

  const html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num" style="width:40px">#</th>
            <th style="min-width:160px">Player</th>
            <th class="num">GP</th>
            <th class="num">PTS</th>
            <th class="num">REB</th>
            <th class="num">AST</th>
            <th class="num">FG3M</th>
            <th class="num">STL</th>
            <th class="num">BLK</th>
            <th class="num">TOV</th>
            <th class="num">FP</th>
            <th class="num">FP/G</th>
          </tr>
        </thead>
        <tbody>
          ${displayData.map((p, idx) => `
            <tr class="${idx < 5 ? 'highlight-row' : ''}">
              <td class="num rank-cell ${idx < 3 ? 'top5' : ''}">${startIdx + idx + 1}</td>
              <td class="player-cell">${p.player}</td>
              <td class="num">${p.gp}</td>
              <td class="num">${p.pts}</td>
              <td class="num">${p.reb}</td>
              <td class="num">${p.ast}</td>
              <td class="num">${p.fg3m}</td>
              <td class="num">${p.stl}</td>
              <td class="num">${p.blk}</td>
              <td class="num">${p.tov}</td>
              <td class="num" style="font-weight:700">${formatNumber(p.tfp, 1)}</td>
              <td class="num" style="font-weight:700;color:var(--accent)">${formatNumber(p.fpg, 2)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('byseason-container').innerHTML = html;
  document.getElementById('season-page-input').value = seasonCurrentPage;
}

// Load on page load
window.addEventListener('load', loadData);
</script>
